<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1d5f63">
  <title>Progress Note Builder</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172124;
      --muted: #607174;
      --line: #d7e1e2;
      --soft: #eef6f5;
      --panel: #ffffff;
      --primary: #1d5f63;
      --primary-dark: #16494c;
      --accent: #b84c35;
      --ok: #28704b;
      --warn: #a05d00;
      --shadow: 0 18px 48px rgba(20, 42, 45, .14);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(184, 76, 53, .12), transparent 34rem),
        linear-gradient(180deg, #f7fbfa 0%, #eef5f3 52%, #f8faf9 100%);
      color: var(--ink);
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    .app {
      max-width: 980px;
      margin: 0 auto;
      padding: 18px 14px 44px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 2px 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      min-width: 0;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      flex: 0 0 auto;
      border-radius: 8px;
      background: var(--primary);
      display: grid;
      place-items: center;
      box-shadow: 0 8px 18px rgba(29, 95, 99, .25);
    }

    .brand svg {
      width: 25px;
      height: 25px;
      stroke: #fff;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.35rem, 5vw, 2.4rem);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: .95rem;
    }

    .status {
      display: none;
      color: var(--primary-dark);
      font-weight: 700;
      white-space: nowrap;
